services:
  backend:
    build: ./backend
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend:/app
      - db_data:/data
    environment:
      DATABASE_URL: sqlite:////data/database.db
      JWT_SECRET: c31adb21e2a74438d044479ea5d5b1a809964af1b17981dae2f55cfb67126a06
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "127.0.0.1:5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules      # preserva node_modules do container, não sobrescreve com o do host
    environment:
      VITE_API_URL: http://localhost:8000/api
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
