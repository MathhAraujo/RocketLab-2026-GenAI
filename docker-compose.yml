services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: sqlite:///./database.db
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules      # preserva node_modules do container, não sobrescreve com o do host
    environment:
      VITE_PROXY_TARGET: http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
