services:
  backend:
    build: ./backend
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: sqlite:///./database.db
      JWT_SECRET: super-secret-key-1234
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "127.0.0.1:5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules      # preserva node_modules do container, não sobrescreve com o do host
    environment:
      VITE_API_URL: http://localhost:8000/api
    depends_on:
      - backend
    restart: unless-stopped
